services:
  web:
    build: .
    ports: ["5000:5000"]
    environment:
      MONGO_URI: mongodb://mongo:27017/college_library
      SECRET_KEY: change-this-local-secret
    depends_on: [mongo]
  mongo:
    image: mongo:7
    ports: ["27017:27017"]
    volumes: [library_data:/data/db]
volumes:
  library_data:
